name: smart_timetable_builder
description: A production-ready College Social + Timetable Management App.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Existing
  excel: ^4.0.2
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  permission_handler: ^11.3.0
  shared_preferences: ^2.5.5
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

  # Supabase
  supabase_flutter: ^2.12.4

  # UI/UX
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  file_picker: ^8.1.7
  url_launcher: ^6.3.1
  pdf: ^3.12.0
  printing: ^5.14.3
  open_file: ^3.5.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
